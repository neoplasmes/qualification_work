name: Build Server Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: Запушить образ в ghcr.io
        type: boolean
        default: true

concurrency:
  group: build-server
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/qualification-server

jobs:
  build:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/node/server/Dockerfile
          push: ${{ inputs.push }}
          tags: |
            ${{ env.SERVER_IMAGE }}:sha-${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SERVER_IMAGE }}:buildcache,mode=max
