services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-test-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: qualification_test
      PGPORT: 5432
    volumes:
      - ../../../infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '15432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d qualification_test']
      interval: 2s
      timeout: 2s
      retries: 30

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: auth-test-pgbouncer
    volumes:
      - ./test/integration/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./test/integration/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - '16432:5432'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8.6-alpine
    container_name: auth-test-redis
    command: ['redis-server', '--requirepass', 'test_password', '--save', '']
    ports:
      - '16379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'test_password', 'ping']
      interval: 2s
      timeout: 2s
      retries: 30

  auth:
    build:
      context: ../../..
      dockerfile: apps/go/auth/Dockerfile
    container_name: auth-test-service
    env_file:
      - .env.test
    volumes:
      - ./test/integration/keys:/keys:ro
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - '13002:3002'

  # this image actually responses with the same headers, cookies and request body,
  # so it's great and very useful for testing, 'cause we exactly wants to check, that 
  echo:
    image: traefik/whoami:v1.11
    container_name: auth-test-echo
    command: ['--port', '8080']

  openresty:
    image: openresty/openresty:1.29.2.3-alpine-fat
    container_name: auth-test-openresty
    volumes:
      - ./test/integration/openresty/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./test/integration/openresty/upstreams.conf:/etc/nginx/conf.d/upstreams.conf:ro
    depends_on:
      - auth
      - echo
    ports:
      - '18080:80'
