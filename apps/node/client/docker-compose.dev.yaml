name: qualification-work-client-dev

services:
  # ————————————————————————— data ——————————————————————————————
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: qualification
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../../infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d qualification']
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:8.6-alpine
    command:
      [
        'redis-server',
        '--requirepass',
        'dev_password',
        '--appendonly',
        'yes',
      ]
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a dev_password ping | grep PONG']
      interval: 2s
      timeout: 3s
      retries: 30
  
  redis-insight:
    image: redis/redisinsight:3.4
    environment:
      - RI_LOG_LEVEL=debug
    ports:
      - '5540:5540'
    depends_on:
      - redis

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    volumes:
      - ../../../infrastructure/pgbouncer/pgbouncer.dev.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ../../../infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy
  # ————————————————————————————— Apps —————————————————————————
  auth:
    build:
      context: ../../..
      dockerfile: apps/go/auth/Dockerfile
      target: runner-dev
    environment:
      AUTH_PORT: '3002'
      AUTH_LOG_LEVEL: debug
      AUTH_CORS_ENABLED: 'false'
      AUTH_PEPPER: pepper
      AUTH_MAX_FAILED_ATTEMPTS: '15'
      AUTH_LOCKOUT_DURATION: 60s
      AUTH_JWT_PRIVATE_KEY_PATH: /run/secrets/jwt.private.pem
      AUTH_JWT_KID: dev-2026-05
      AUTH_JWT_ISSUER: qualification-auth
      AUTH_JWT_AUDIENCE: internal
      AUTH_INTERNAL_JWT_TTL: 60s
      DATABASE_URL: postgres://admin:dev_password@pgbouncer:5432/qualification?sslmode=disable&default_query_exec_mode=simple_protocol&pool_max_conns=10
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: dev_password
      REDIS_DB: '0'
    volumes:
      - ../../../e2e/docker-compose/keys/jwt.private.pem:/run/secrets/jwt.private.pem:ro
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-qO-',
          '--tries=1',
          '--timeout=2',
          'http://127.0.0.1:3002/ready',
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ../../..
      dockerfile: apps/node/server/Dockerfile
    environment:
      NODE_ENV: production
      SERVER_PORT: '3001'
      CLIENT_ORIGIN: http://localhost:8080
      DATABASE_URL: postgres://admin:dev_password@pgbouncer:5432/qualification?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: dev_password
      AUTH_JWKS_URL: http://auth:3002/gateway/.well-known/jwks.json
      AUTH_JWT_ISSUER: qualification-auth
      AUTH_JWT_AUDIENCE: internal
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-qO-',
          '--tries=1',
          '--timeout=2',
          'http://127.0.0.1:3001/health',
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  data-service:
    build:
      context: ../../..
      dockerfile: apps/node/data-service/Dockerfile
    environment:
      NODE_ENV: production
      DATA_SERVICE_PORT: '3003'
      CLIENT_ORIGIN: http://localhost:8080
      DATABASE_URL: postgres://admin:dev_password@pgbouncer:5432/qualification?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: dev_password
      AUTH_JWKS_URL: http://auth:3002/gateway/.well-known/jwks.json
      AUTH_JWT_ISSUER: qualification-auth
      AUTH_JWT_AUDIENCE: internal
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-qO-',
          '--tries=1',
          '--timeout=2',
          'http://127.0.0.1:3003/health',
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  # ————————————————————————— Gateway —————————————————————————
  gateway:
    image: openresty/openresty:1.29.2.3-alpine-fat
    ports:
      - '8080:80'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./docker-compose/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./docker-compose/openresty/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker-compose/openresty/upstreams.conf:/etc/nginx/conf.d/upstreams.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      server:
        condition: service_healthy
      data-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-qO-',
          '--tries=1',
          '--timeout=2',
          'http://127.0.0.1/_gateway/health',
        ]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres-data:
  redis-data:
