language: "typescript"
tags:
  - "client"
  - "node"

dependsOn:
  - "primitive-server"

fileGroups:
  cfg:
    - "package.json"
    - "tsconfig.json"
    - "*.config.{js,ts}"
    - "playwright.config.ts"
  src:
    - "{src,server,vite}/**/*"
    - "!**/*.test.{js,ts,tsx}"
  test:
    - "{src,server}/*.test.{js,ts,tsx}"
    - "test/**/*"
    - "e2e/**/*"

tasks:
  dev:
    command: "pnpm dev"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
      - ".env"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  dev-compose-up:
    command: "DOCKER_BUILDKIT=0 docker compose -f docker-compose.dev.yaml up -d --build --wait --wait-timeout 300"
    toolchain: system
    inputs:
      - "docker-compose.dev.yaml"
      - "docker-compose/**/*"
    options:
      cache: false
      outputStyle: "stream"

  dev-compose-down:
    command: "docker compose -f docker-compose.dev.yaml down"
    toolchain: system
    options:
      cache: false
      outputStyle: "stream"

  build:
    command: "pnpm build"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
      - "index.html"
    outputs:
      - "dist"

  build-client:
    command: "pnpm build:client"
    inputs:
      - "src/**/*"
      - "vite.config.ts"
      - "index.html"
    outputs:
      - "dist/client"

  build-server:
    command: "pnpm build:server"
    deps:
      - "^:build"
    inputs:
      - "server/**/*"
      - "src/**/*"
      - "tsup.config.ts"
      - "vite.config.ts"
    outputs:
      - "dist/server"
      - "dist/server.js"

  preview:
    command: "pnpm preview"
    deps:
      - "~:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  start:
    command: "pnpm start"
    deps:
      - "~:build"
    inputs:
      - "dist/**/*"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  typecheck:
    command: "pnpm typecheck"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  test:
    command: "pnpm test"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  test-e2e:
    command: "pnpm test:e2e"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
      - ".env"
      - "docker-compose.dev.yaml"
      - "docker-compose/**/*"
    options:
      cache: false
      outputStyle: "stream"

  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false
