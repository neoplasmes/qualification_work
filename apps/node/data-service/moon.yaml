language: 'typescript'

tags:
  - 'node'

dependsOn:
  - 'primitive-server'
  - 'types'
  - 'microservice-config'
  - 'microservice-utils'

fileGroups:
  cfg:
    - 'package.json'
    - 'tsconfig.json'
    - '*.config.{js,ts}'
  src:
    - 'src/**/*'
    - '!**/*.test.ts'
  test:
    - 'src/**/*.test.ts'
    - 'src/test/**/*'
    - 'docker-compose.test.yaml'
    - '.env.test'

tasks:
  dev:
    command: "pnpm dev"
    deps:
      - "^:build"
      - "root:development-compose-up"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"
      
  typecheck:
    command: 'pnpm typecheck'
    deps:
      - '^:build'
    inputs:
      - '@group(src)'
      - '@group(test)'
      - '@group(cfg)'

  test-compose-up:
    script: |
      docker compose -f docker-compose.test.yaml up -d \
        --renew-anon-volumes \
        --build \
        --wait \
        --wait-timeout 300
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  test-compose-down:
    command: 'docker compose -f docker-compose.test.yaml down -v'
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  test:
    script: |
      docker compose -f docker-compose.test.yaml up -d \
        --renew-anon-volumes --build --wait --wait-timeout 300
      RC=0
      pnpm test || RC=$?
      docker compose -f docker-compose.test.yaml down -v
      exit $RC
    deps:
      - '^:build'
    inputs:
      - '@group(src)'
      - '@group(test)'
      - '@group(cfg)'
    options:
      outputStyle: stream
      mutex: docker-tests
