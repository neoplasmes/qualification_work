language: "typescript"

tags:
  - "node"

dependsOn:
  - "primitive-server"
  - "types"
  - "microservice-config"
  - "microservice-utils"

fileGroups:
  cfg:
    - "package.json"
    - "tsconfig.json"
    - "*.config.{js,ts}"
  src:
    - "src/**/*"
  test:
    - "src/**/*.test.ts"
    - "src/test/**/*"

# TODO: remove db:up commands from package json and instead add deps on root command
tasks:
  dev:
    command: "pnpm dev"
    deps:
      - "^:build"
      - "root:development-compose-up"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  build:
    command: "pnpm build"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    outputs:
      - "dist"

  start:
    command: "pnpm start"
    deps:
      - "~:build"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false

  typecheck:
    command: "pnpm typecheck"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
  
  test-compose-up:
    script: |
      docker compose -f docker-compose.test.yaml up -d \
        --force-recreate \
        --renew-anon-volumes \
        --build \
        --wait \
        --wait-timeout 300
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  test-compose-down:
    command: "docker compose -f docker-compose.test.yaml down -v"
    toolchain: system
    options:
      cache: false
      outputStyle: stream
  
  test:
    script: |
      trap 'docker compose -f docker-compose.test.yaml down -v' EXIT
      pnpm test
    deps:
      - "^:build"
      - "~:test-compose-up"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
      - ".env.test"
      - "docker-compose.test.yaml"
    options:
      outputStyle: stream
