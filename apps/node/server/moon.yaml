language: "typescript"

tags:
  - "node"

dependsOn:
  - "primitive-server"
  - "types"
  - "microservice-config"

fileGroups:
  cfg:
    - "package.json"
    - "tsconfig.json"
    - "*.config.{js,ts}"
  src:
    - "src/**/*"
  test:
    - "src/**/*.test.ts"
    - "src/test/**/*"

# TODO: remove db:up commands from package json and instead add deps on root command
tasks:
  dev:
    command: "pnpm dev"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
      - ".env"
      - "/docker-compose.dev.yaml"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  build:
    command: "pnpm build"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    outputs:
      - "dist"

  start:
    command: "pnpm start"
    deps:
      - "~:build"
    inputs:
      - "dist/**/*"
      - ".env"
    options:
      cache: false
      persistent: true
      outputStyle: "stream"

  typecheck:
    command: "pnpm typecheck"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  test:
    command: "pnpm test"
    deps:
      - "^:build"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
      - ".env.test"
      - "/docker-compose.test.yaml"

  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false
