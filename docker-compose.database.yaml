services:
  postgres:
    container_name: postgres-local-development
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: qualification
      PGPORT: 5432
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d qualification']
      interval: 2s
      timeout: 2s
      retries: 30

  pgbouncer:
    container_name: pgbouncer-local-development
    image: edoburu/pgbouncer:v1.25.1-p0
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.dev.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    container_name: redis-local-development
    image: redis:8.6-alpine
    command: ['redis-server', '--requirepass', 'dev_password', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  redis-insight:
    container_name: redis-insight-local-development
    image: redis/redisinsight:3.4
    environment:
      - RI_LOG_LEVEL=debug
    ports:
      - '5540:5540'
    depends_on:
      - redis

volumes:
  postgres-data:
  redis-data:
