# ??? future is unclear
services:
  postgres:
    container_name: postgres-dev
    build:
      context: .
      dockerfile: infrastructure/postgres/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qualification_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-qualification}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-qualification}']
      interval: 5s
      timeout: 5s
      retries: 3
    
  redis:
    container_name: redis-dev
    image: redis:8.6-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-qualification_redis_password}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD" --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy volatile-ttl']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s       
      timeout: 5s
      retries: 3

  redis-insight:
    container_name: redisinsight-dev
    image: redis/redisinsight:latest
    ports:
     - '5040:5040'
    volumes:
     - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy


  server:
    container_name: server-dev
    build:
      context: .
      dockerfile: apps/node/server/Dockerfile
    ports:
      - '${SERVER_PORT:-3001}:3001'
    env_file:
      - apps/node/server/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    healthcheck:
      # wget и curl недоступны внутри node:alpine
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    container_name: client-dev
    build:
      context: .
      dockerfile: apps/node/client/Dockerfile
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT:-3000}:3000'
    env_file:
      - apps/node/client/.env
    environment:
      NODE_ENV: production
    healthcheck:
      # TODO: in clear alpine there IS a wget. this command should be fixed
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      server:
        condition: service_healthy

  nginx:
    container_name: nginx-dev
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
    restart: unless-stopped
    environment:
      CLIENT_UPSTREAM: client:3000
      SERVER_UPSTREAM: server:3001
    ports:
      - '${EDGE_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/_nginx/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy

volumes:
  redis_data:
  redisinsight_data:
