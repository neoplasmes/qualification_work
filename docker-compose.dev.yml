services:
  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: apps/server/postgres/Dockerfile
    restart: unless-stopped
    environment:
      # ${env_variable:-default_value}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-qualification}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-qualification}']
      interval: 30s
      timeout: 5s
      retries: 5

  server:
    container_name: server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '${SERVER_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-qualification}
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
        context: .
        dockerfile: apps/client/Dockerfile
    container_name: client
    restart: unless-stopped
    ports:
        # СLIENT_PORT снаружи - 80 внутри nginx
        - '${CLIENT_PORT:-80}:80'
    healthcheck:
      # healthcheck выполняем по 80 порту, так как эти команды выполняются внутри докера, 
      # а внутри докера у нас клиент на 80-м порту
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
        server:
          condition: service_healthy

volumes:
  postgres_data:
