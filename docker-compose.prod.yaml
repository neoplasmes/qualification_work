#! DEPRECATED: stands as archive and as alternative version to run the ecosystem
#! golang microservices are not provided there   
# На VPS у нас 4 GB RAM
# TODO: мигрировать на Yandex Lockbox, чтобы доставать оттуда секреты.
# TODO: вместе с верхним пунктом нужно добавить некий скрипт, который будет выгружать секреты из Lockbox'а
services:
  postgres:
    build:
      context: .
      dockerfile: services/postgres/Dockerfile
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # в проде не пробрасываем порт наружу, т.к. это не нужно
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 15s
      timeout: 5s
      retries: 5
    # лимиты RAM
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  server:
    image: ghcr.io/neoplasmes/qualification-server:latest
    container_name: server
    restart: unless-stopped
    # в проде порт сервера тоже не нужен снаружи, к нему проксирует nginx
    expose:
      - '3001'
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: '3001'
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
    healthcheck:
      # wget и curl недоступны внутри node:alpine
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD" --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy volatile-ttl']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    image: ghcr.io/neoplasmes/qualification-client:latest
    container_name: client
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      server:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
    container_name: nginx
    restart: unless-stopped
    environment:
      CLIENT_UPSTREAM: client:3000
      SERVER_UPSTREAM: server:3001
    ports:
      - '${CLIENT_PORT:-80}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/_nginx/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
