# На VPS у нас 4 GB RAM

services:
  postgres:
    build:
      context: .
      dockerfile: apps/server/postgres/Dockerfile
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # в проде не пробрасываем порт наружу, т.к. это не нужно
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 15s
      timeout: 5s
      retries: 5
    # лимиты RAM
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  server:
    image: ghcr.io/neoplasmes/qualification-server:latest
    container_name: server
    restart: unless-stopped
    # в проде порт сервера тоже не нужен снаружи, к нему проксирует nginx
    expose:
      - '4000'
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw r}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: ghcr.io/neoplasmes/qualification-client:latest
    container_name: client
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT:-80}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
