services:
  postgres:
    container_name: postgres-test
    build:
      context: .
      dockerfile: services/postgres/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qualification_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-qualification_test}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-qualification_test}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis-test
    image: redis:8.6-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-qualification_redis_password}
    ports:
      - '${REDIS_PORT:-6380}:6379'
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD" --save "" --appendonly no --maxmemory 128mb --maxmemory-policy volatile-ttl']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 5s
      retries: 10
