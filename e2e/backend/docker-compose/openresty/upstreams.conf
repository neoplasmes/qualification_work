#* all routes are static, so there is no sidecar discovery service

upstream auth_backend {
    server auth:3002;
}

upstream server_backend {
    server server:3001;
}

upstream data_service_backend {
    server data-service:3003;
}

# no client in these tests
upstream client_backend {
    server 127.0.0.1:65535 down;
}
