language: "typescript"

tags:
  - "e2e"
  - "node"

fileGroups:
  src:
    - "**/*"

tasks:
  typecheck:
    command: "pnpm typecheck"
    inputs:
      - "@group(src)"

  test-compose-up:
    script: |
      DOCKER_BUILDKIT=0 docker compose -f ../docker-compose/docker-compose.yaml up -d \
        --renew-anon-volumes \
        --build \
        --wait \
        --wait-timeout 300
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  test-compose-down:
    command: "docker compose -f ../docker-compose/docker-compose.yaml down -v"
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  compose-logs:
    command: "docker compose -f ../docker-compose/docker-compose.yaml logs --tail=200"
    toolchain: system
    options:
      cache: false
      outputStyle: stream

  e2e:
    script: |
      export NODE_EXTRA_CA_CERTS="$(pwd)/../docker-compose/keys/ca.pem"
      pnpm test
    toolchain: system
    options:
      cache: false
      outputStyle: stream
      mutex: docker-tests
