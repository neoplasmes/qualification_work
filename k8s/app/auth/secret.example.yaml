apiVersion: v1
kind: Secret
metadata:
  name: auth-jwt-key
  namespace: app
type: Opaque
stringData:
  # PKCS#8 PEM (RSA 2048 or ED25519). generate locally and replace before applying:
  #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt.private.pem
  # then:
  #   kubectl -n app create secret generic auth-jwt-key \
  #     --from-file=jwt.private.pem=./jwt.private.pem --dry-run=client -o yaml > k8s/app/auth/secret.yaml
  jwt.private.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REAL_PEM
    -----END PRIVATE KEY-----
