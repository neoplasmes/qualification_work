apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: data-service
          image: "ghcr.io/neoplasmes/qualification_work/apps_node_data-service:custom"
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          resources:
            requests:
              memory: "192Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: app-env-config
            - secretRef:
                name: app-secret
          # pending-merge tmp storage; image creates /tmp/datasets, mount keeps it writable
          volumeMounts:
            - name: merge-tmp
              mountPath: /tmp/datasets
      volumes:
        - name: merge-tmp
          emptyDir: {}
