map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

proxy_cache_path /tmp/auth_cache
    levels=1:2
    keys_zone=auth_cache:10m
    max_size=64m
    inactive=60s
    use_temp_path=off;

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /_gateway/health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_request_body on;
    }

    location /api/data/ {
        auth_request /__auth;
        auth_request_set $internal_auth $upstream_http_x_internal_auth;
        auth_request_set $auth_cache_status $upstream_cache_status;

        proxy_set_header X-Internal-Auth $internal_auth;
        add_header X-Auth-Cache $auth_cache_status always;
        proxy_buffering off;

        rewrite ^/api/data/(.*) /api/$1 break;
        proxy_pass http://data_service_backend;
    }

    location /api/ {
        auth_request /__auth;
        auth_request_set $internal_auth $upstream_http_x_internal_auth;
        auth_request_set $auth_cache_status $upstream_cache_status;

        proxy_set_header X-Internal-Auth $internal_auth;
        add_header X-Auth-Cache $auth_cache_status always;
        proxy_buffering off;
        proxy_pass http://server_backend;
    }

    location = /__auth {
        internal;
        proxy_pass http://auth_backend/gateway/jwt;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;

        proxy_cache auth_cache;
        proxy_cache_key "v1:$cookie_session";
        proxy_cache_valid 204 30s;
        proxy_cache_valid 401 5s;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }

    location / {
        proxy_buffering off;
        proxy_pass http://client_backend;
    }
}
