apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: gateway-discovery
      shareProcessNamespace: true
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: init-upstreams
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - "cp /init/upstreams.conf.initial /shared/upstreams.conf"
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: static
              mountPath: /init
      containers:
        # Our service gateway
        - name: openresty
          image: openresty/openresty:alpine-fat
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: static
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
            - name: static
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /_gateway/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_gateway/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
        # Our sidecar for the restarts
        - name: discovery
          image: ghcr.io/neoplasmes/qualification_work/k8s_app_gateway_discovery:custom
          env:
            - name: WATCH_SERVICES
              value: |
                client_backend:3000:client:least_conn,
                server_backend:3001:server:least_conn
            - name: NGINX_PID_FILE
              value: "/shared/nginx.pid"
            - name: UPSTREAMS_OUTPUT
              value: "/shared/upstreams.conf"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: shared
          emptyDir: {}
        - name: static
          configMap:
            name: gateway-config
