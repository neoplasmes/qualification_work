apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: gateway-config
    namespace: app
    files:
      - nginx.conf
      - default.conf
      - upstreams.initial.conf
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
