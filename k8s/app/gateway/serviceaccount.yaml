apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-discovery
  namespace: app
---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-discovery
  namespace: app
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-discovery
  namespace: app
subjects:
  - kind: ServiceAccount
    name: gateway-discovery
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-discovery
