project:
  k3d-cluster-name: "local-development"
  anchors:
    common-task: &common-task
      toolchain: "system"
      options:
        cache: false
        outputStyle: "stream"

tasks:
  deploy-to-registry:
    description: "builds image from the Dockerfile at <path-to-Dockerfile> provided and pushes it to ghcr.io (see README.md for more details)"
    command: "./scripts/ghcr.deploy.sh"
    toolchain: "system"
    options:
      interactive: true
      cache: false
      outputStyle: stream

  development-compose-up:
    description: "locally runs a stack of data storage technologies, used in production, fo local development purposes"
    command: "docker compose -f docker-compose.database.yaml up -d"
    <<: *common-task
  
  development-compose-down:
    command: "docker compose -f docker-compose.database.yaml down"
    <<: *common-task
  # TODO: universality or delete
  # postgres-migrate-init:
  #   description: "runs the init PostgreSQL migration job in kubernetes"
  #   command: "./scripts/applyMigration.sh k8s/postgres/migrations/init/job.yaml infrastructure/postgres/init"
  #   <<: *common-task

  # k3d managment for local testing of kubernetes (k3s) (not for weak machines)
  # TODO: as project will grow, this set of command should be deleted probably??
  k3s-local-create:
    description: "creates k3s kubernetes cluster on localhost for testing the deployment part of the ecosystem"
    command: "k3d cluster create @meta(k3d-cluster-name) --config ./k8s/k3d.config.yaml"
    <<: *common-task

  k3s-local-run:
    command: "k3d cluster run @meta(k3d-cluster-name)"
    <<: *common-task
  
  k3s-local-stop:
    command: "k3d cluster stop @meta(k3d-cluster-name)"
    <<: *common-task
  
  k3s-local-delete:
    command: "k3d cluster delete @meta(k3d-cluster-name)"
    <<: *common-task

  
  

    
