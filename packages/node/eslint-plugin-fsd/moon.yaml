language: "javascript"

tags:
  - "node"

fileGroups:
  cfg:
    - "package.json"
  src:
    - "src/**/*.js"

tasks:
  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false
