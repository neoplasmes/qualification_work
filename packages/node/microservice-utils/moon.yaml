language: "typescript"

tags:
  - "node"

fileGroups:
  cfg:
    - "package.json"
    - "tsconfig.json"
    - "*.config.{js,ts}"
  src:
    - "src/**/*.ts"
  test:
    - "**/*.test.ts"
    - "src/test-utils/**/*.ts"

tasks:
  typecheck:
    command: "pnpm typecheck"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
    options:
      cache: false

  fmt:
    command: "pnpm prettier"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
    options:
      cache: false

  test:
    command: "pnpm test"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"
