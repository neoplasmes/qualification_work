language: "typescript"

tags:
  - "node"

fileGroups:
  cfg:
    - "package.json"
    - "tsconfig.json"
    - "*.config.{js,ts}"
  src:
    - "src/**/*"
  test:
    - "src/**/*.test.ts"
    - "src/**/*.bench.ts"

tasks:
  build:
    command: "pnpm build"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    outputs:
      - "dist"

  typecheck:
    command: "pnpm typecheck"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  test:
    command: "pnpm test"
    inputs:
      - "@group(src)"
      - "@group(test)"
      - "@group(cfg)"

  # bench and loadtest are skipped

  lint:
    command: "pnpm lint"
    inputs:
      - "@group(src)"
      - "@group(cfg)"

  lint-fix:
    command: "pnpm lint:fix"
    inputs:
      - "@group(src)"
      - "@group(cfg)"
    options:
      cache: false
