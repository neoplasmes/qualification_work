packages:
  - 'apps/node/*'
  - 'packages/node/*'
  - 'e2e/backend'
  - 'e2e/frontend'
  - 'generation'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  argon2: true
  esbuild: true
  lefthook: true
  msw: true

linkWorkspacePackages: true

catalogs:
  postgres:
    pg: ^8.20.0
    "@types/pg": ^8.18.0
  backend:
    jsep: ^1.4.0
    redis: ^5.11.0
    zod: ^4.3.6
  devtools:
    dotenv: ^17.3.1
    dotenv-cli: ^11.0.0
    tsup: ^8.5.1
    tsx: ^4.21.0
